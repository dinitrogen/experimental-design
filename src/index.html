<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>XD Lab — Science Olympiad Experimental Design</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Science Olympiad Experimental Design practice and study platform for Division B students">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <meta name="theme-color" content="#1976d2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="XD Lab">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    // Apply saved theme before first paint to prevent flash
    (function() {
      var t = 'light';
      try { t = localStorage.getItem('exd-theme') || 'light'; } catch(e) {}
      if (t === 'dark' || t === 'cardinal') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
