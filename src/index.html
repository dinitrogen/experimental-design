<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>XD Lab — Science Olympiad Experimental Design</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Science Olympiad Experimental Design practice and study platform for Division B students">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    // Apply saved theme before first paint to prevent flash
    (function() {
      var t = 'light';
      try { t = localStorage.getItem('exd-theme') || 'light'; } catch(e) {}
      if (t === 'dark' || t === 'cardinal') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
